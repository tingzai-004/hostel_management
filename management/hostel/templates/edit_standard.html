{% extends 'moban.html' %}
{% block content %}
    <div class="container mt-4">
        <h5>编辑房间 {{ room.name }} 的费用类型</h5>
        <div class="mt-3">
            <!-- 显示该房间的所有单个费用类型 -->
            <table class="table table-sm table-bordered">
                <thead>
                    <tr>
                        <th>费用类型</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for fee in room_fees %}
                    <tr>
                        <td>{{ fee.feetype.name }}</td>
                        <td>
                            <!-- 单个费用类型的删除按钮：传递fee.id -->
                            
                             <a href="/hostel/edit_standard/?room_id={{ room.id }}&del_fee_id={{ fee.id }}" 
                               class="btn btn-outline-danger btn-sm"
                               onclick="return confirm('确定删除该费用类型吗？')"><i class="fas fa-trash-alt"></i>删除</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="2" class="text-center text-muted">该房间暂无费用类型</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <!-- 返回列表页按钮 -->
        <a href="/hostel/standard/" class="btn btn-secondary mt-2">返回列表</a>
    </div>
{% endblock %}
</body>
</html>
