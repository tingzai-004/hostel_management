<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>右侧下拉菜单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #c0f8f2;
        }

        body {
            background-color: #f0f0e6;
        }

        .navbar {
            background-color: #2c3e50 !important;
            color: #fff ;
        }

        .navbar-nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
        }

        /* .navbar {
            background-color:rgb(118, 243, 230) !important;  */
        /* } */
        .nav-left {
            display: flex;
        }

        .nav-right {
            display: flex;
            margin-left: auto;
        }
    </style>
</head>

<body>
    {% block list_content%}
    {% endblock %}
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <!-- <a class="navbar-brand" href="/info/">ZIDD单位人员管理</a> -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav">
                    <div class="nav-left">

                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                                aria-expanded="false" style="color: #fff;">
                                宿舍资源管理
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="/admin_eight/room/" style="color: #fff;">区域安排</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>

                                <li><a class="dropdown-item" href="/admin_eight/dorm/">楼栋安排</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="/admin_eight/balance/">宿舍房间安排</a></li>

                                <li>
                                    <hr class="dropdown-divider">
                                </li>

                            </ul>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                                aria-expanded="false">
                                住宿人员管理
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="/admin_five/room/">住宿人员名单</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="/admin_five/dorm/">入住记录</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>

                            </ul>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                                aria-expanded="false">
                                费用账单管理
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="/admin_eight/room/">水电用量记录</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>

                                <li><a class="dropdown-item" href="/admin_eight/dorm/">计费项目</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="/admin_eight/balance/">费用分摊管理</a></li>

                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="/admin_eight/balance/">账单生成与记录</a></li>

                                <li>
                                    <hr class="dropdown-divider">
                                </li>

                            </ul>
                        </li>

                    </div>

                    <div class="nav-right">
                        <!-- 右侧下拉菜单 -->
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                                aria-expanded="false">
                                个人中心
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="#">个人信息</a></li>
                                <li><a class="dropdown-item" href="#">重置密码</a></li>
                                <li><a class="dropdown-item" href="#">报表统计</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="#">退出登录</a></li>

                            </ul>
                        </li>

                    </div>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container content">
        {% block content %}
        <!-- 子模板的内容将在这里显示 -->
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
